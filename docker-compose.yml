services:
  postgres:
    image: postgres:15-alpine
    container_name: kubelab-postgres
    environment:
      POSTGRES_DB: kubelab
      POSTGRES_USER: kubelab
      POSTGRES_PASSWORD: kubelab-secure-password-123
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Use 5433 to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubelab -d kubelab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kubelab-network

  backend:
    image: veeno/kubelab-backend:latest
    container_name: kubelab-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://kubelab:kubelab-secure-password-123@postgres:5432/kubelab
      # For local testing, use kubeconfig instead of in-cluster config
      KUBECONFIG: /home/node/.kube/config
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount kubeconfig for local Kubernetes API access (optional)
      - ~/.kube/config:/home/node/.kube/config:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kubelab-network

  frontend:
    image: veeno/kubelab-frontend:latest
    container_name: kubelab-frontend
    environment:
      REACT_APP_API_URL: http://backend:3000
      NODE_ENV: production
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - kubelab-network

volumes:
  postgres-data:
    driver: local

networks:
  kubelab-network:
    driver: bridge

