apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lightning
  namespace: kubelab
  labels:
    app: lightning
    component: crypto
spec:
  serviceName: lightning
  replicas: 1
  selector:
    matchLabels:
      app: lightning

  template:
    metadata:
      labels:
        app: lightning
        component: crypto
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-bitcoin
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z bitcoin-0.bitcoin.kubelab.svc.cluster.local 18332; do echo waiting; sleep 2; done && echo "Bitcoin RPC ready"']
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 32Mi

      containers:
        - name: lnd
          image: lightninglabs/lnd:daily-testing-only
          ports:
            - containerPort: 10009
              name: rest
            - containerPort: 9735
              name: p2p
            - containerPort: 9092
              name: metrics
          command:
            - lnd
            - --bitcoin.active
            - --bitcoin.testnet
            - --bitcoin.node=bitcoind
            - --bitcoind.rpchost=bitcoin-0.bitcoin.kubelab.svc.cluster.local:18332
            - --bitcoind.rpcuser=$(RPC_USER)
            - --bitcoind.rpcpass=$(RPC_PASSWORD)
            - --restlisten=0.0.0.0:10009
            - --noseedbackup
            - --prometheus.enable
          env:
            - name: RPC_USER
              valueFrom:
                secretKeyRef:
                  name: crypto-credentials
                  key: bitcoin-rpc-user
            - name: RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crypto-credentials
                  key: bitcoin-rpc-password
          volumeMounts:
            - name: lightning-data
              mountPath: /root/.lnd
            - name: admin-macaroon
              mountPath: /root/.lnd/data/chain/bitcoin/testnet/admin.macaroon
              readOnly: true

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi

          readinessProbe:
            httpGet:
              path: /v1/getinfo
              port: 10009
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /v1/getinfo
              port: 10009
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10

  # Persistent storage
  volumeClaimTemplates:
    - metadata:
        name: lightning-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Headless service for stable network identity
apiVersion: v1
kind: Service
metadata:
  name: lightning
  namespace: kubelab
  labels:
    app: lightning
spec:
  clusterIP: None  # Headless service
  selector:
    app: lightning
  ports:
    - port: 10009
      name: rest
      targetPort: 10009
    - port: 9735
      name: p2p
      targetPort: 9735
    - port: 9092
      name: metrics
      targetPort: 9092
