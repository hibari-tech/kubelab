apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lightning
  namespace: kubelab
  labels:
    app: lightning
    component: crypto
spec:
  serviceName: lightning
  replicas: 1
  selector:
    matchLabels:
      app: lightning

  template:
    metadata:
      labels:
        app: lightning
        component: crypto
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: wait-for-bitcoin
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z bitcoin-0.bitcoin.kubelab.svc.cluster.local 18332; do echo ready; sleep 2; done && echo "Bitcoin RPC ready"']
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 20m
              memory: 32Mi

      containers:
        - name: lnd
          image: lightninglabs/lnd:v0.17.0-beta.rc1
          ports:
            - containerPort: 10009
              name: rest
            - containerPort: 9735
              name: p2p
          command:
            - lnd
            - --bitcoin.active
            - --bitcoin.testnet
            - --bitcoin.node=bitcoind
            - --bitcoind.rpchost=bitcoin-0.bitcoin.kubelab.svc.cluster.local:18332
            - --bitcoind.rpcuser=$(RPC_USER)
            - --bitcoind.rpcpass=$(RPC_PASSWORD)
            - --restlisten=0.0.0.0:10009
            - --noseedbackup  # TESTnet only - for learning
          env:
            - name: RPC_USER
              valueFrom:
                secretKeyRef:
                  name: crypto-credentials
                  key: bitcoin-rpc-user
            - name: RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crypto-credentials
                  key: bitcoin-rpc-password
          volumeMounts:
            - name: lightning-data
              mountPath: /root/.lnd
            - name: admin-macaroon
              mountPath: /root/.lnd/data/chain/bitcoin/testnet/admin.macaroon
              readOnly: true

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - lncli
                - getinfo
              </stdin>
            - --rpcserver
              - --restserver
            - --restlisten=0.0.0.0:10009
            - --noseedbackup  # TESTNET only
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Custom LND metrics exporter sidecar
        - name: lnd-exporter
          image: node:18-alpine
          ports:
            - containerPort: 9092
              name: metrics
          command:
            - node
            - /usr/src/app/exporters/lnd-exporter.js
          workingDir: /usr/src/app
          env:
            - LND_REST_HOST=lightning-0.lightning.kubelab.svc.cluster.local
            - LND_REST_PORT=10009
          volumeMounts:
            - name: admin-macaroon
              mountPath: /root/.lnd/data/chain/bitcoin/testnet/admin.macaroon
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

  # Persistent storage
  volumeClaimTemplates:
    - metadata:
        name: lightning-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
