name: Validate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-yaml:
    name: Validate YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install yamllint
        run: pip install yamllint
      
      - name: Validate Kubernetes manifests
        run: |
          yamllint -d relaxed k8s/**/*.yaml || true
          echo "YAML validation complete (warnings are acceptable)"

  validate-dockerfiles:
    name: Validate Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install hadolint
        run: |
          wget -O /tmp/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
          sudo mv /tmp/hadolint /usr/local/bin/hadolint
      
      - name: Lint Dockerfiles
        run: |
          hadolint backend/Dockerfile || true
          hadolint frontend/Dockerfile || true
          echo "Dockerfile linting complete (warnings are acceptable)"

  check-secrets:
    name: Check for Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns (excluding known safe values)
          if grep -r "password.*=.*['\"].*[a-zA-Z0-9]{8,}" --include="*.yaml" --include="*.yml" --include="*.js" --include="*.jsx" k8s/ backend/ frontend/ | grep -v "kubelab-secure-password-123" | grep -v "admin/admin" | grep -v "postgres-secret"; then
            echo "⚠️  Potential hardcoded secrets found. Review the output above."
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

